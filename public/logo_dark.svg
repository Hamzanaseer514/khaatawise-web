<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0a0a0c"/>

  <!-- Open Book -->
  <g transform="translate(256, 256)">
    <path d="M-10,-80 C-28,-84 -105,-92 -120,-76 C-124,-72 -124,-70 -124,64 C-108,50 -28,55 -10,58 Z"
          fill="#16161a" stroke="#22d3ee" stroke-width="5" stroke-linejoin="round"/>
    <path d="M10,-80 C28,-84 105,-92 120,-76 C124,-72 124,-70 124,64 C108,50 28,55 10,58 Z"
          fill="#16161a" stroke="#22d3ee" stroke-width="5" stroke-linejoin="round"/>
    <path d="M-10,-80 L0,-85 L10,-80 L10,58 L0,63 L-10,58 Z"
          fill="#0a7ea4" fill-opacity="0.25" stroke="#22d3ee" stroke-width="3"/>
  </g>

  <!-- KW badge - top center of book, sitting on the spine -->
  <g transform="translate(256, 155)">
    <circle cx="0" cy="0" r="22" fill="#0a0a0c" stroke="#22d3ee" stroke-width="3"/>
    <text x="0" y="2" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="18"
          fill="#22d3ee" text-anchor="middle" dominant-baseline="middle" letter-spacing="-0.5">KW</text>
  </g>

  <!-- LEFT: Bank/Building -->
  <g transform="translate(188, 232)">
    <polygon points="0,-30 -34,-2 34,-2" fill="#22d3ee"/>
    <rect x="-23" y="4" width="9" height="34" rx="1.5" fill="#22d3ee"/>
    <rect x="-4.5" y="4" width="9" height="34" rx="1.5" fill="#22d3ee"/>
    <rect x="14" y="4" width="9" height="34" rx="1.5" fill="#22d3ee"/>
    <rect x="-30" y="42" width="60" height="7" rx="2" fill="#22d3ee"/>
  </g>

  <!-- RIGHT: Bar Chart -->
  <g transform="translate(322, 236)">
    <rect x="-26" y="12" width="14" height="26" rx="2" fill="#0ea5e9" opacity="0.75"/>
    <rect x="-6" y="-2" width="14" height="40" rx="2" fill="#22d3ee" opacity="0.85"/>
    <rect x="14" y="-18" width="14" height="56" rx="2" fill="#25d1f4"/>
    <rect x="-30" y="40" width="60" height="2.5" rx="1" fill="#22d3ee" opacity="0.45"/>
  </g>
</svg>
